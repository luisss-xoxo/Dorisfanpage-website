<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Na Kontaktoni / Log In — Doris</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #1a1a1a;
      color: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #6b0f9c;
      padding: 50px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 3em;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      background-color: #222;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
    }

    .tab {
      cursor: pointer;
      padding: 10px 20px;
      border-bottom: 3px solid transparent;
      font-weight: bold;
      color: #ff66b2;
      transition: border-bottom 0.3s;
    }

    .tab.active {
      border-bottom: 3px solid #ff66b2;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input, select {
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: none;
      font-size: 1em;
      background-color: #1a1a1a;
      color: #f0f0f0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    input::placeholder {
      color: #888;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 12px;
      background-color: #ff66b2;
      color: #fff;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #e055a5;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #6b0f9c;
      color: #fff;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Na Kontaktoni / Log In 💌</h1>
  </header>

  <div class="container">
    <div class="tabs">
      <div class="tab active" onclick="showForm('login')">Log In</div>
      <div class="tab" onclick="showForm('signup')">Sign Up</div>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <select required>
        <option value="">Zgjidh Gjininë</option>
        <option value="male">Mashkull</option>
        <option value="female">Femër</option>
        <option value="other">Tjetër</option>
      </select>
      <button type="submit">Log In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signup-form" style="display:none;">
      <input type="text" placeholder="Emri" required>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <select required>
        <option value="">Zgjidh Gjininë</option>
        <option value="male">Mashkull</option>
        <option value="female">Femër</option>
        <option value="other">Tjetër</option>
      </select>
      <button type="submit">Sign Up</button>
    </form>
  </div>

  <footer>
    &copy; 2026 Doris 💜
  </footer>

  <script>
    function showForm(form) {
      const loginForm = document.getElementById('login-form');
      const signupForm = document.getElementById('signup-form');
      const tabs = document.querySelectorAll('.tab');

      if(form === 'login') {
        loginForm.style.display = 'flex';
        signupForm.style.display = 'none';
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'flex';
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
      }
    }
  </script>

</body>
</html>
